<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Amey</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full">
    <div id="app" class="h-full w-full flex items-center justify-center overflow-auto">
        <!-- Confetti Container -->
        <div id="confetti-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
        
        <!-- Main Content -->
        <div class="text-center p-6 relative z-10 w-full max-w-sm">
            <!-- Cake -->
            <div class="text-6xl mb-3 float">
                🎂
            </div>
            
            <!-- Title -->
            <h1 id="title" class="text-4xl mb-2 pop" data-color="#e75480">Happy Birthday!</h1>
            
            <!-- Name -->
            <h2 id="name-text" class="text-2xl font-bold mt-2 pop" data-color="#c2185b" data-font="Quicksand" data-size="36">Amey Cantik 💖</h2>
            
            <!-- Message -->
            <p id="message-text" class="text-base mt-5 pop" data-color="#6d4c41" data-font="Quicksand" data-size="18">Semoga harimu indah seperti senyummu! ✨</p>
            
            <!-- Wish -->
            <div id="wish-text" class="text-sm mt-5 pop leading-relaxed" data-color="#d81b60" data-font="Quicksand" data-size="14">
                Selalu sehat, bahagia, dan semua usahamu tercapai! 💫
            </div>
            
            <!-- Decorations -->
            <div class="mt-6 flex justify-center gap-3 text-2xl">
                <span class="float" style="animation-delay: 0.2s;">🎈</span>
                <span class="float" style="animation-delay: 0.5s;">🎁</span>
                <span class="float" style="animation-delay: 0.8s;">🎉</span>
                <span class="float" style="animation-delay: 1.1s;">💐</span>
                <span class="float" style="animation-delay: 1.4s;">🎈</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
